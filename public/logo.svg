<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <!-- Pink circle background -->
  <circle cx="40" cy="40" r="36" fill="#E8C5C1"/>
  
  <!-- Woman baking illustration (simple line art) -->
  <!-- Body -->
  <ellipse cx="40" cy="52" rx="14" ry="16" fill="#D4A09A"/>
  <!-- Head -->
  <circle cx="40" cy="28" r="10" fill="#F5DEB3"/>
  <!-- Hair -->
  <ellipse cx="40" cy="22" rx="10" ry="7" fill="#5C3D2E"/>
  <ellipse cx="32" cy="26" rx="4" ry="8" fill="#5C3D2E"/>
  <ellipse cx="48" cy="26" rx="4" ry="8" fill="#5C3D2E"/>
  <!-- Apron -->
  <ellipse cx="40" cy="54" rx="10" ry="12" fill="#FFF8F0"/>
  <!-- Mixing bowl -->
  <ellipse cx="40" cy="66" rx="12" ry="5" fill="#D4955A"/>
  <path d="M28 63 Q40 72 52 63" stroke="#B07840" stroke-width="2" fill="none"/>
  <!-- Arms -->
  <line x1="26" y1="44" x2="20" y2="58" stroke="#F5DEB3" stroke-width="4" stroke-linecap="round"/>
  <line x1="54" y1="44" x2="60" y2="58" stroke="#F5DEB3" stroke-width="4" stroke-linecap="round"/>
  <!-- Hands holding bowl -->
  <circle cx="20" cy="60" r="4" fill="#F5DEB3"/>
  <circle cx="60" cy="60" r="4" fill="#F5DEB3"/>
  
  <!-- Brand text -->
  <!-- SABÉ in dancing script -->
  <text x="88" y="42" font-family="Dancing Script, cursive" font-size="34" font-weight="700" fill="#3D1C0B" letter-spacing="2">SABÉ</text>
  <!-- Tagline -->
  <text x="88" y="56" font-family="Lato, sans-serif" font-size="8" fill="#7A5C48" letter-spacing="2.5" font-weight="700">HOMEMADE BAKERY &amp; PASTICCERIA</text>
  <!-- Est text -->
  <text x="88" y="68" font-family="Lato, sans-serif" font-size="7" fill="#7A5C48" letter-spacing="1.5" font-style="italic">Est. 2025</text>
</svg>
