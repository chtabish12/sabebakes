  <circle cx="58" cy="81" r="2.5" fill="#C47B3E" opacity="0.7"/>
  <circle cx="68" cy="81" r="2.5" fill="#C47B3E" opacity="0.7"/>
  <circle cx="78" cy="81" r="2.5" fill="#C47B3E" opacity="0.7"/>

  <!-- Stars / sparkles -->
  <path d="M22 30 L23.5 26 L25 30 L29 31.5 L25 33 L23.5 37 L22 33 L18 31.5 Z" fill="white" opacity="0.6"/>
  <path d="M92 42 L93 39 L94 42 L97 43 L94 44 L93 47 L92 44 L89 43 Z" fill="white" opacity="0.5"/>
